name: Tests Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run unit tests
        run: |
          go test -v -count=1 \
            $(go list ./internal/... ./cmd/... | grep -Ev '/mocks|/repository')

      - name: Generate coverage report
        run: |
          # Coverage считаем только по тестируемым unit-пакетам
          # (исключаем cmd — там main(), исключаем repository — он покрыт integration)
          go test -count=1 -coverprofile=coverage.out \
            $(go list ./internal/... | grep -Ev '/mocks|/repository')

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage.out
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Verify Docker is available
        run: docker version

      - name: Run integration tests
        run: go test -tags=integration -v -count=1 ./internal/repository/...

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Create .env file
        run: |
          cat > .env <<EOF
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=shortener
          HTTP_SERVER_PASSWORD=testpassword
          EOF

      - name: Start backend + postgres
        run: docker compose up -d --build postgres minifylink

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8082/healthy > /dev/null 2>&1; then
              echo "✅ Backend is ready!"
              exit 0
            fi
            echo "  attempt $i/60..."
            sleep 2
          done
          echo "❌ Backend failed to start"
          docker compose logs minifylink
          exit 1

      - name: Run E2E tests
        run: go test -tags=e2e -v -count=1 ./tests/e2e/...
        env:
          E2E_BASE_URL: http://localhost:8082

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs minifylink

      - name: Stop services
        if: always()
        run: docker compose down -v
